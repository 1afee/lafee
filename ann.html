<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>春のメンバー特典</title>
  <style>
    body {
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
      line-height: 1.8;
      padding: 1.6em;
      margin: 0;
      background: linear-gradient(160deg, #faf4ec, #e6c9c2);
      color: #4b2e05;
      text-align: center;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      background: linear-gradient(to bottom, #ffffff, #fcf5eb);
      padding: 1.6em;
      border-radius: 18px;
      border: 1px solid #c8a3a9;
      box-shadow: 0 10px 24px rgba(80, 20, 30, 0.26);
    }

    h1 {
      font-family: "Hiragino Mincho ProN", serif;
      color: #7a1f2f;
      font-size: 1.7em;
      margin-bottom: 0.8em;
    }

    p {
      font-size: 1.05em;
      margin: 0.6em 0;
    }

    .coupon {
      background: linear-gradient(to bottom right, #fff4f5, #f2d6da);
      padding: 1.4em;
      border-radius: 12px;
      margin-top: 1.4em;
      border: 1px solid #c38b95;
      box-shadow: inset 0 0 8px rgba(120, 30, 50, 0.12);
    }

    .coupon h2 {
      font-size: 1.3em;
      color: #8b4513;
      margin-bottom: 0.6em;
    }

    ul {
      list-style-type: none;
      padding-left: 0;
      text-align: left;
      display: inline-block;
    }

    li {
      margin: 0.5em 0;
    }

    a {
      display: inline-block;
      margin-top: 1.6em;
      color: #7a1f2f;
      text-decoration: none;
      font-weight: bold;
      border-bottom: 2px solid #b85c6b;
      padding-bottom: 0.1em;
    }

    a:hover {
      color: #9e2d41;
      border-color: #9e2d41;
    }

    @media (max-width: 600px) {
      body {
        padding: 1em;
      }
      .container {
        padding: 1.2em;
      }
      h1 {
        font-size: 1.5em;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <h1>春のメンバー特典 </h1>
  <p id="accessTime" style="font-size:0.9em;color:#7a1f2f;"></p>
　　 <p><strong>このページをご提示の上</strong></p>
    <p><strong>ご登録のお名前をお伝えください。</strong></p>

  <p><strong>※スクリーンショット不可</strong></p>
  <p><strong>※メンバーご本人来店時のみ有効</strong></p>

  <div class="coupon">
    <h2>🎁 デザート特典のご案内</h2>
    <ul>
      <li><strong>デザート４種盛り合わせが５種盛り合わせになります。</strong></li>
      <li><strong>有効期限：</strong>2026年5月31日（日）まで</li>
      <li>特典は期間内１回限りです。</li>
       <li>お子様メニューは該当しません。</li>
      <li>5名様以上の場合は、デザートの仕込みの都合上<br>
        <strong>ご予約時に特典利用の旨をお伝えください。</strong></li>
    </ul>
  </div>

  <p><a href="https://www.lafee.me/">ラ・フェ公式ページ</a></p>

</div>
<script>
  const now = new Date();
  const formatted = now.getFullYear() + "年" +
    (now.getMonth() + 1) + "月" +
    now.getDate() + "日 " +
    now.getHours().toString().padStart(2,'0') + ":" +
    now.getMinutes().toString().padStart(2,'0');

  document.getElementById("accessTime").textContent =
    "アクセス日時：" + formatted;
</script>
</body>
</html>
